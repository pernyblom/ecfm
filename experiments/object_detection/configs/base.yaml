data:
  images_root: outputs/fred_reps
  labels_root: datasets/FRED
  split_files:
    train: datasets/FRED/dataset_splits/canonical/train_split.txt
    val: datasets/FRED/dataset_splits/canonical/test_split.txt
  labels_subdir: Event_YOLO
  representations: ["xt_my", "yt_mx", "cstr3"]
  # heatmap_representations: ["xt_my", "yt_mx"]  # Set to [] to disable heatmap heads and heatmap supervision.
  heatmap_representations: []
  image_size: [224, 224]
  frame_size: [1280, 720]
  label_time_unit: 1.0e-6
  image_window_ms: 33.333
  image_window_mode: trailing
  verify_render_manifest: true
  render_manifest_name: render_manifest.json
  window_tolerance_ms: 2.0
  require_boxes: false
  # max_samples_train: 2000
  max_samples_train:
  # max_samples_val: 400
  max_samples_val:
  seed: 123
  cache_dir: outputs/object_detection_cache

model:
  backbone:
    # type: small_cnn
    type: resnet18
    in_channels: 3
    channels: [32, 64, 128]
    out_dim: 128
  fusion_hidden_dim: 256
  heatmap_hidden_dim: 256
  box_hidden_dim: 256
  num_queries: 8
  query_hidden_dim: 256

train:
  device: cuda
  epochs: 20
  batch_size: 32
  num_workers: 4
  persistent_workers: true
  pin_memory: true
  prefetch_factor: 4
  lr: 1.0e-3
  weight_decay: 1.0e-4
  heatmap_weight: 1.0  # Ignored if data.heatmap_representations is [].
  box_weight: 2.0
  box_l1_weight: 1.0
  box_ciou_weight: 1.0
  objectness_weight: 1.0
  match_score_weight: 1.0
  match_l1_weight: 1.0
  match_ciou_weight: 1.0
  compute_train_epoch_map: false
  compute_val_epoch_map: true
  log_every: 20
  checkpoint_every: 1
  checkpoint_dir: outputs/object_detection_ckpt
  metrics_jsonl: outputs/object_detection_ckpt/metrics.jsonl
  vis_every: 1
  vis_samples: 8
  vis_backdrop_rep: cstr3
  vis_score_threshold: 0.5
  vis_output_dir: outputs/object_detection_vis

eval:
  vis_backdrop_rep: cstr3
  max_visualizations: 256
  vis_score_threshold: 0.5
  vis_output_dir: outputs/object_detection_eval_vis
  metrics_output: outputs/object_detection_eval/metrics.json
