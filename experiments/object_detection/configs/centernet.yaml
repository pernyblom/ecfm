data:
  images_root: outputs/fred_reps
  labels_root: datasets/FRED
  split_files:
    # train: datasets/FRED/dataset_splits/canonical/train_split.txt
    # val: datasets/FRED/dataset_splits/canonical/test_split.txt
    train: datasets/FRED/dataset_splits/canonical/train_tiny.txt
    val: datasets/FRED/dataset_splits/canonical/test_tiny.txt
  # auto uses RGB_YOLO for RGB-only training and Event_YOLO whenever an event branch is present.
  labels_subdir: auto
  # representations: ["xt_my", "yt_mx", "cstr3"]
  # Grid-split aliases such as xt_my_10x10 reuse the base xt_my image size unless
  # an explicit image_sizes entry is provided.
  # representations: ["cstr3", "xt_my", "xt_my_10x10", "rgb"]
  representations: ["cstr3", "xt_my", "rgb"]
  heatmap_representations: []
  frame_size: [1280, 720]
  # image_size: [224, 224]
  image_sizes:
    xt: [398, 224]
    xt_my: [398, 224]
    yt_mx: [224, 224]
    yt: [224, 224]
    cstr3: [398, 224]
    cstr2: [398, 224]
    rgb: [398, 224]
    padded_rgb: [398, 224]

  retain_spatial_dimensions: false
  temporal_bins: 224
  label_time_unit: 1.0e-6
  image_window_ms: 33.333
  image_window_mode: trailing
  verify_render_manifest: false
  render_manifest_name: render_manifest.json
  window_tolerance_ms: 2.0
  require_boxes: false
  exclude_multiple_objects: false
  filter_missing_representations: true
  velocity_tracks_file: cleaned_tracks.txt
  velocity_match_iou: 0.3
  max_samples_train: 10000
  max_samples_val: 2000
  seed: 123
  cache_dir: outputs/object_detection_cache

model:
  detector: centernet
  backbone:
    type: resnet18
    in_channels: 3
    out_dim: 256
    # CenterNet needs a spatial feature map close to model.output_stride.
    # layer1 is stride 4 for ResNet18; layer4 is stride 32 and is too coarse
    # for stable dense size/offset prediction.
    feature_stage: layer3
    # Fuse layer2-layer4 context back into the stride-4 layer1 map before the
    # CenterNet heads. Set fpn: false to use the cheaper layer1-only baseline.
    fpn: false
    fpn_dim: 128
  centernet_hidden_dim: 256
  output_stride: 4
  topk: 100
  predict_velocity: false
  # Optional CenterNet-style learned upsampling after representation fusion.
  # mode: none keeps the original experiment behavior. mode: learned fuses on
  # a lower grid, upsamples with transposed convolutions, then resizes once to
  # the exact output_stride grid before the dense heads.
  centernet_upsampling:
    mode: learned
    stages: 2
    hidden_dim: 256
  # When true, grid-split reps such as xt_my_10x10 run the first encoder
  # convolution independently inside each rendered cell before stitching the
  # feature map back together.
  cell_local_first_conv: false
  cell_local_first_conv_representations: []

train:
  device: cuda
  epochs: 40
  batch_size: 32
  accumulation_steps: 2
  num_workers: 2
  persistent_workers: true
  pin_memory: true
  prefetch_factor: 2
  lr: 1.0e-3
  weight_decay: 1.0e-4
  heatmap_weight: 1.0
  centernet_size_weight: 2.0
  centernet_offset_weight: 1.0
  velocity_weight: 0.1
  centernet_gaussian_radius: 2
  compute_train_epoch_map: false
  compute_val_epoch_map: true
  log_every: 20
  checkpoint_every: 1
  checkpoint_dir: outputs/object_detection_centernet_ckpt
  resume_checkpoint:
  metrics_jsonl: outputs/object_detection_centernet_ckpt/metrics.jsonl
  vis_every: 1
  vis_samples: 8
  vis_backdrop_rep: cstr3
  vis_score_threshold: 0.3
  vis_output_dir: outputs/object_detection_centernet_vis

eval:
  vis_backdrop_rep: cstr3
  max_visualizations: 256
  vis_score_threshold: 0.3
  vis_output_dir: outputs/object_detection_centernet_eval_vis
  metrics_output: outputs/object_detection_centernet_eval/metrics.json
