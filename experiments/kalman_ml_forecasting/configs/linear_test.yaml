data:
  images_root: outputs/fred_reps
  labels_root: datasets/FRED
  labels_subdir: Event_YOLO
  tracks_file: cleaned_tracks.txt
  split_files:
    train: datasets/FRED/dataset_splits/canonical/train_split.txt
    test: datasets/FRED/dataset_splits/canonical/test_split.txt
  # Optional random folder-level holdout from split_files.train. When enabled,
  # the train dataset uses the remaining folders and train_eval uses the held-out
  # folders, so per-epoch train_eval samples are not trained on.
  train_eval_split:
    enabled: true
    eval_fraction: 0.1
    eval_count:
    seed: 123
  representations: []
  # Optional fixed-shape spatial masking around the final history box, just
  # before prediction starts. fixed_pixels returns real cropped tensors with
  # this output size. For xt* representations only the x axis is cut and the
  # temporal axis is kept intact. For yt* representations only the y axis is cut
  # and the temporal axis is kept intact. Other representations use both
  # spatial axes.
  spatial_cutout:
    mode: none  # none, box_scale/box_fraction, fixed_pixels/fixed
    scale: 1.0  # used by box_scale; 1.0 means the current box size
    size_px: [256, 256]  # used by fixed_pixels
    min_size_px: 1
    fill: 0.0
  # Add "event_frames" to read dataset-native frames from
  # datasets/FRED/<folder>/Event/Frames when present.
  # Set [] to isolate filter-state/covariance inputs; this requires
  # model.use_filter_state_features: true or model.filter_covariance_features
  # set to "diag" or "full".
  frame_size: [1280, 720]
  retain_spatial_dimensions: true
  temporal_bins: 224
  label_time_unit: 1.0e-6
  track_time_unit: 1.0
  time_align: auto
  image_window_ms: 400.0
  image_window_mode: trailing
  verify_render_manifest: false
  render_manifest_name: render_manifest.json
  window_tolerance_ms: 5.0
  history_ms: 400.0
  forecast_ms: 800.0
  # Optional minimum usable labeled duration. This filters whole tracks and
  # forecast-window candidates, so it can require e.g. 1.2 s tracklets even when
  # history_ms + forecast_ms is shorter. The emitted past/future tensors still
  # use history_ms and forecast_ms.
  min_track_duration_ms:
  label_period_s:
  max_tracks:
  max_samples_train: 400000
  max_samples_train_eval: 40000
  max_samples_test:
  filter_missing_representations: true
  # Optional sample-level decorrelation during dataset construction, applied
  # after max_samples_* caps. This drops forecast windows, not whole tracks.
  # Each configured split is decorrelated independently when its dataset is
  # built. Use ["all"] to apply it to every constructed split.
  decorrelation:
    enabled: false
    splits: ["train"]
    # greedy: remove samples to reduce motion-prior predictability.
    # random: skip scoring and keep a reproducible random subset only.
    method: greedy
    # Optional reproducible pre-subset before greedy/random selection. Use this
    # to make different runs start from exactly the same candidate sample pool.
    random_subset_fraction: 1.0
    random_subset_samples:
    random_subset_seed:
    keep_fraction: 0.5
    target_samples:
    min_samples: 4
    # raw: normalized image position + velocity
    # centered: centered image position + velocity
    # motion_priors: centered position + velocity + distance-to-center + speed
    feature_mode: motion_priors
    greedy_candidates: 64
    # Leave blank to use the dataset seed, which is already offset per split.
    # random_seed controls method=random; seed controls greedy candidate
    # sampling and is also the fallback for random_subset_seed/random_seed.
    seed:
    random_seed:
    ridge_lambda: 1.0e-3
    corr_weight: 1.0
    r2_weight: 1.0
    # Optional raw px/s^2 penalty for global mean fitted acceleration. Keep 0.0
    # to only reduce feature predictability; set a small positive value to also
    # discourage constant acceleration bias such as a global downward tendency.
    mean_accel_weight: 0.0
    progress: true
  seed: 123
  cache_dir: outputs/kalman_ml_forecasting_cache

model:
  backbone:
    type: resnet18
    in_channels: 3
    channels: [32, 64, 128]
    out_dim: 128
  # Number of box-history samples passed to the learned residual head. If the
  # dataset history window has fewer samples, the model pads with the earliest box.
  history_steps: 12
  # Box-history feature mode for the learned residual head:
  # - raw: encode normalized absolute history boxes plus relative times
  # - relative: encode history boxes after subtracting the final history box
  # - none: do not pass a direct box-history feature to the residual head
  history_feature_mode: none
  # Set fusion_layers/state_layers/residual_layers to 0 for a linear-ish
  # residual model over the selected learned features, flattened box history,
  # rollout state, and dt. Defaults keep the historical nonlinear MLP behavior.
  fusion_hidden_dim: 256
  fusion_layers: 0
  state_hidden_dim: 128
  state_layers: 2
  residual_hidden_dim: 256
  residual_layers: 0
  residual_scale: 1.0
  predict_size_residuals: true
  # Rollout initial state: "last_four" keeps the paper-style linear fit,
  # "kalman_filter" starts the learned residual rollout from the configured
  # Kalman filter's final history state.
  initial_state_source: last_four
  # If true, append the configured Kalman filter's final history state
  # to the encoder features before image fusion.
  use_filter_state_features: true
  # Which Kalman state entries to append, and which covariance entries to keep
  # when filter_covariance_features is enabled:
  # - full: [cx, cy, w, h, vx, vy, vw, vh]
  # - center_full: [cx, cy, vx, vy]
  # - center_position: [cx, cy]
  # - center_velocity: [vx, vy]
  # - velocities: [vx, vy, vw, vh]
  filter_state_feature_mode: center_full
  # Optional covariance features from the configured Kalman filter history
  # state. Use "none", "diag" for the selected covariance diagonal entries, or
  # "full" for the flattened selected covariance submatrix.
  filter_covariance_features: none
  cell_local_first_conv: false
  cell_local_first_conv_representations: []


# Optimized 160000 train samples
# Best val score: 109.78
# --objective-weights "fde_center_px=1,ade_center_px=0.25,miou=-100"
kalman:
  enabled: true
  initial_pos_std: 9.6178901e-06
  initial_size_std: 0.020246828
  initial_vel_std: 0.0004936771
  process_pos_std: 4.2104816e-06
  process_size_std: 1.2950349
  process_vel_std: 0.13281414
  process_size_vel_std: 0.003452712
  measurement_pos_std: 0.010384851
  measurement_size_std: 0.11314614


train:
  device: cuda
  epochs: 100
  batch_size: 1024
  accumulation_steps: 1
  num_workers: 2
  persistent_workers: true
  pin_memory: true
  prefetch_factor: 2
  lr: 1.0e-3
  weight_decay: 1.0e-4
  smooth_l1_beta: 0.05
  residual_l2_weight: 0.0
  grad_clip_norm: 10.0
  log_every: 20
  # Per-epoch evaluation splits. train_eval uses data.split_files.train with
  # data.max_samples_train_eval; val is used for best-checkpoint selection.
  eval_splits_each_epoch: ["train_eval"]
  best_metric_split: train_eval
  best_metric: loss
  best_metric_mode: min
  # Enable only after data.split_files.test points to a held-out test split.
  run_test_on_best: true
  test_split_key: test
  test_metrics_json: outputs/kalman_ml_forecasting_ckpt/best_test_metrics.json
  checkpoint_every: 0
  checkpoint_dir: outputs/kalman_ml_forecasting_ckpt
  resume_checkpoint:
  metrics_jsonl: outputs/kalman_ml_forecasting_ckpt/metrics.jsonl
