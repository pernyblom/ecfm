# Linear sweep

command: python experiments/kalman_ml_forecasting/train.py --config {config}
configs_dir: configs

overrides:
  train.epochs: 40
  train.batch_size: 1024
  train.lr: 2.0e-2
  data.representations: []
  data.max_samples_train: 
  data.max_samples_train_eval:
  data.train_eval_split.eval_fraction: 0.2
  model.fusion_layers: 0
  model.residual_layers: 0
  model.use_filter_state_features: true
  model.history_feature_mode: none
  model.filter_state_center_position_normalization: frame_centered
  data.decorrelation.mean_accel_weight: 1.0e-4

templates:
  train.checkpoint_dir: "{output_dir}/runs/{name}/ckpt"
  train.metrics_jsonl: "{output_dir}/runs/{name}/metrics.jsonl"
  train.test_metrics_json: "{output_dir}/runs/{name}/best_test_metrics.json"
  data.cache_dir: "{output_dir}/runs/{name}/cache"

grid:
  model.filter_state_feature_mode:
    - center_full
    - center_position
    - center_velocity
  data.decorrelation.enabled:
    - true
    - false


  # data.forecast_ms:
