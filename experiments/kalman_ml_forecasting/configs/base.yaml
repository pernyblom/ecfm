#   process_size_vel_std: 0.012997082
#   measurement_pos_std: 0.010307864
#   measurement_size_std: 0.07238128


train:
  device: cuda
  epochs: 40
  batch_size: 32
  num_workers: 2
  persistent_workers: true
  pin_memory: true
  prefetch_factor: 2
  lr: 1.0e-3
  weight_decay: 1.0e-4
  smooth_l1_beta: 0.05
  residual_l2_weight: 0.0
  grad_clip_norm: 10.0
  log_every: 20
  checkpoint_every: 1
  checkpoint_dir: outputs/kalman_ml_forecasting_ckpt
  resume_checkpoint:
  metrics_jsonl: outputs/kalman_ml_forecasting_ckpt/metrics.jsonl
