train:
  device: cuda
  epochs: 40
  batch_size: 32
  num_workers: 2
  persistent_workers: true
  pin_memory: true
  prefetch_factor: 2
  lr: 1.0e-3
  weight_decay: 1.0e-4
  smooth_l1_beta: 0.05
  residual_l2_weight: 0.0
  grad_clip_norm: 10.0
  log_every: 20
  # Per-epoch evaluation splits. train_eval uses data.split_files.train with
  # data.max_samples_train_eval; val is used for best-checkpoint selection.
  eval_splits_each_epoch: ["train_eval", "val"]
  best_metric_split: val
  best_metric: loss
  best_metric_mode: min
  # Enable only after data.split_files.test points to a held-out test split.
  run_test_on_best: false
  test_split_key: test
  test_metrics_json: outputs/kalman_ml_forecasting_ckpt/best_test_metrics.json
  checkpoint_every: 1
  checkpoint_dir: outputs/kalman_ml_forecasting_ckpt
  resume_checkpoint:
  metrics_jsonl: outputs/kalman_ml_forecasting_ckpt/metrics.jsonl
