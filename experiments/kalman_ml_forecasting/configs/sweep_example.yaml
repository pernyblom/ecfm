# Example spec for scripts/generate_config_sweep.py.
# Generate with:
# python scripts/generate_config_sweep.py --base-config experiments/kalman_ml_forecasting/configs/base.yaml --spec experiments/kalman_ml_forecasting/configs/sweep_example.yaml --output-dir outputs/kalman_ml_sweeps/example

command: python experiments/kalman_ml_forecasting/train.py --config {config}
configs_dir: configs

# Optional static overrides applied to every generated config before the grid.
overrides:
  train.epochs: 40
  train.best_metric_split: train_eval
  train.eval_splits_each_epoch: ["train_eval", "val"]
  data.min_track_duration_ms: 1200.0

# Optional output path templates. Available fields: {name}, {index},
# {output_dir}, {config_path}.
templates:
  train.checkpoint_dir: "{output_dir}/runs/{name}/ckpt"
  train.metrics_jsonl: "{output_dir}/runs/{name}/metrics.jsonl"
  train.test_metrics_json: "{output_dir}/runs/{name}/best_test_metrics.json"
  train.log_file: "{output_dir}/runs/{name}/train.log"
  data.cache_dir: "{output_dir}/runs/{name}/cache"

# Optional subset of grid keys used in generated config names. If omitted, all
# grid keys are included.
name_fields:
  - data.representations
  - data.spatial_cutout.mode
  - data.spatial_cutout.size_px

grid:
  data.representations:
    - ["xt_my", "yt_mx", "cstr3"]
    - ["event_frames"]
    - ["xt_my", "yt_mx", "cstr3", "event_frames"]
  data.spatial_cutout.mode:
    - none
    - fixed_pixels
  data.spatial_cutout.size_px:
    - [224, 224]
    - [384, 384]
